@"
services:
  - type: web
    name: library-management-backend
    runtime: java
    repo: https://github.com/Rishi-1601/Library-Management-System
    branch: main
    buildCommand: cd backend && chmod +x mvnw && ./mvnw clean install -DskipTests
    startCommand: cd backend && java -jar target/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: library-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: library-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads

databases:
  - name: library-db
    databaseName: library
    user: library_user
    plan: free
"@ | Out-File -FilePath render.yaml -Encoding UTF8