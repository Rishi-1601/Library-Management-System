<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Library Management System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="nav-brand">📚 LibraryMS</div>
            <div class="nav-menu">
                <a href="dashboard.html" class="nav-item active">Dashboard</a>
                <a href="books.html" class="nav-item">Books</a>
                <a href="add-book.html" class="nav-item">Add Book</a>
                <div class="user-info">
                    <span class="user-name" id="userName">Loading...</span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>
        
        <div class="main-content">
            <div class="welcome-section">
                <h1 id="welcomeMessage">Welcome back!</h1>
                <p>Here's what's happening with your library today.</p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📚</div>
                    <div class="stat-details">
                        <h3>Total Books</h3>
                        <div class="stat-number" id="totalBooks">0</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-details">
                        <h3>Available Books</h3>
                        <div class="stat-number" id="availableBooks">0</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">📖</div>
                    <div class="stat-details">
                        <h3>Borrowed Books</h3>
                        <div class="stat-number" id="borrowedBooks">0</div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-details">
                        <h3>Total Users</h3>
                        <div class="stat-number" id="totalUsers">0</div>
                    </div>
                </div>
            </div>
            
            <div class="section-header">
                <h2>📖 Recent Books</h2>
                <a href="add-book.html" class="btn-add">➕ Add New Book</a>
            </div>
            
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search by title, author, or ISBN...">
                <button class="search-btn" onclick="searchBooks()">Search</button>
            </div>
            
            <div class="books-table-container">
                <table id="booksTable">
                    <thead>
                        <tr>
                            <th>ISBN</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Publisher</th>
                            <th>Available</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booksTableBody">
                        <tr>
                            <td colspan="7" class="loading">Loading books...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="errorMessage" class="error-message" style="display: none;"></div>
    
    <script src="../js/main.js"></script>
    <script>
        // Load data when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadUserInfo();
            loadDashboardData();
            loadBooks();
        });
        
        function loadUserInfo() {
            const username = sessionStorage.getItem('username');
            const fullName = sessionStorage.getItem('fullName');
            
            if (!username) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('userName').textContent = fullName || username;
            document.getElementById('welcomeMessage').textContent = `Welcome back, ${fullName || username}!`;
        }
        
        async function loadDashboardData() {
            try {
                const booksResponse = await fetch(`${API_BASE_URL}/books`);
                const books = await booksResponse.json();
                
                const totalBooks = books.length;
                const availableBooks = books.filter(b => b.available > 0).length;
                const borrowedBooks = books.filter(b => b.available < b.quantity).length;
                
                document.getElementById('totalBooks').textContent = totalBooks;
                document.getElementById('availableBooks').textContent = availableBooks;
                document.getElementById('borrowedBooks').textContent = borrowedBooks;
                document.getElementById('totalUsers').textContent = '42'; // Placeholder
                
            } catch (error) {
                console.error('Error loading stats:', error);
                showError('Failed to load statistics');
            }
        }
        
        async function loadBooks() {
            try {
                const response = await fetch(`${API_BASE_URL}/books`);
                const books = await response.json();
                
                const tbody = document.getElementById('booksTableBody');
                
                if (books.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="no-data">No books found. Add your first book!</td></tr>';
                    return;
                }
                
                const recentBooks = books.slice(0, 5);
                
                tbody.innerHTML = recentBooks.map(book => `
                    <tr>
                        <td>${book.isbn || 'N/A'}</td>
                        <td>${book.title || 'N/A'}</td>
                        <td>${book.author || 'N/A'}</td>
                        <td>${book.publisher || 'N/A'}</td>
                        <td>${book.available || 0} / ${book.quantity || 0}</td>
                        <td>${getStatusBadge(book)}</td>
                        <td>
                            <button class="action-btn" onclick="viewBook(${book.id})">View</button>
                            ${book.available > 0 ? 
                                `<button class="action-btn" onclick="borrowBook(${book.id})">Borrow</button>` : 
                                '<button class="action-btn" disabled>Unavailable</button>'}
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Error loading books:', error);
                document.getElementById('booksTableBody').innerHTML = 
                    '<tr><td colspan="7" class="no-data">Error loading books. Make sure backend is running.</td></tr>';
            }
        }
        
        function getStatusBadge(book) {
            if (book.available <= 0) {
                return '<span class="status-badge status-unavailable">Unavailable</span>';
            } else if (book.available < book.quantity) {
                return '<span class="status-badge status-borrowed">Partially Available</span>';
            } else {
                return '<span class="status-badge status-available">Available</span>';
            }
        }
        
        async function searchBooks() {
            const keyword = document.getElementById('searchInput').value;
            if (!keyword.trim()) {
                loadBooks();
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/books/search?keyword=${encodeURIComponent(keyword)}`);
                const books = await response.json();
                
                const tbody = document.getElementById('booksTableBody');
                
                if (books.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="no-data">No books found matching your search.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = books.map(book => `
                    <tr>
                        <td>${book.isbn || 'N/A'}</td>
                        <td>${book.title || 'N/A'}</td>
                        <td>${book.author || 'N/A'}</td>
                        <td>${book.publisher || 'N/A'}</td>
                        <td>${book.available || 0} / ${book.quantity || 0}</td>
                        <td>${getStatusBadge(book)}</td>
                        <td>
                            <button class="action-btn" onclick="viewBook(${book.id})">View</button>
                            ${book.available > 0 ? 
                                `<button class="action-btn" onclick="borrowBook(${book.id})">Borrow</button>` : 
                                '<button class="action-btn" disabled>Unavailable</button>'}
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Error searching books:', error);
                showError('Search failed');
            }
        }
        
        function viewBook(id) {
            alert(`View book ${id} - Coming soon!`);
        }
        
        function borrowBook(id) {
            alert(`Borrow book ${id} - Coming soon!`);
        }
    </script>
</body>
</html>
