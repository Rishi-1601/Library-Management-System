<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book - Library Management System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="nav-brand">📚 LibraryMS</div>
            <div class="nav-menu">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="books.html" class="nav-item">Books</a>
                <a href="add-book.html" class="nav-item active">Add Book</a>
                <div class="user-info">
                    <span class="user-name" id="userName">Loading...</span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>
        
        <div class="form-container">
            <div class="form-header">
                <h1>📖 Add New Book</h1>
                <p>Fill in the details to add a new book to the library</p>
            </div>
            
            <form id="addBookForm">
                <div class="form-group">
                    <label for="isbn">ISBN *</label>
                    <input type="text" id="isbn" name="isbn" required placeholder="e.g., 978-0134685991">
                </div>
                
                <div class="form-group">
                    <label for="title">Book Title *</label>
                    <input type="text" id="title" name="title" required placeholder="Enter book title">
                </div>
                
                <div class="form-group">
                    <label for="author">Author *</label>
                    <input type="text" id="author" name="author" required placeholder="Enter author name">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="publisher">Publisher</label>
                        <input type="text" id="publisher" name="publisher" placeholder="Enter publisher name">
                    </div>
                    
                    <div class="form-group">
                        <label for="quantity">Quantity *</label>
                        <input type="number" id="quantity" name="quantity" required min="1" value="1">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="shelfLocation">Shelf Location</label>
                    <input type="text" id="shelfLocation" name="shelfLocation" placeholder="e.g., A-12, B-3">
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" placeholder="Enter book description (optional)"></textarea>
                </div>
                
                <button type="submit" class="btn-submit">➕ Add Book to Library</button>
            </form>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>
        </div>
    </div>
    
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadUserInfo();
        });
        
        function loadUserInfo() {
            const username = sessionStorage.getItem('username');
            if (username) {
                document.getElementById('userName').textContent = username;
            }
        }
        
        document.getElementById('addBookForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const bookData = {
                isbn: document.getElementById('isbn').value,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                publisher: document.getElementById('publisher').value || null,
                quantity: parseInt(document.getElementById('quantity').value),
                shelfLocation: document.getElementById('shelfLocation').value || null,
                description: document.getElementById('description').value || null
            };
            
            try {
                const response = await fetch(`${API_BASE_URL}/books`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(bookData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Book added successfully!');
                    document.getElementById('addBookForm').reset();
                } else {
                    showError(data.error || 'Failed to add book');
                }
            } catch (error) {
                console.error('Error adding book:', error);
                showError('Network error. Is the backend running?');
            }
        });
    </script>
</body>
</html>
