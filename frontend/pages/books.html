<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books - Library Management System</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-select {
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            min-width: 150px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        .page-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 5px;
        }
        .page-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
        }
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 1rem;
            top: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .book-details {
            margin: 1rem 0;
        }
        .book-details p {
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: #f8f9fa;
            border-radius: 5px;
        }
        .book-details strong {
            display: inline-block;
            width: 120px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="nav-brand">📚 LibraryMS</div>
            <div class="nav-menu">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="books.html" class="nav-item active">Books</a>
                <a href="my-books.html" class="nav-item">My Books</a>
                <a href="add-book.html" class="nav-item" id="addBookLink">Add Book</a>
                <div class="user-info">
                    <span class="user-name" id="userName">Loading...</span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>
        </nav>
        
        <div class="main-content">
            <div class="section-header">
                <h2>📖 All Books</h2>
            </div>
            
            <div class="filters">
                <input type="text" class="search-input" id="searchInput" placeholder="Search by title, author, or ISBN..." style="flex: 1;">
                <select class="filter-select" id="categoryFilter">
                    <option value="">All Categories</option>
                </select>
                <select class="filter-select" id="availabilityFilter">
                    <option value="all">All Books</option>
                    <option value="available">Available Only</option>
                    <option value="borrowed">Borrowed Only</option>
                </select>
                <button class="search-btn" onclick="applyFilters()">Apply Filters</button>
                <button class="search-btn" onclick="resetFilters()" style="background: #6c757d;">Reset</button>
            </div>
            
            <div class="books-table-container">
                <table id="booksTable">
                    <thead>
                        <tr>
                            <th>ISBN</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>Available</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booksTableBody">
                        <tr>
                            <td colspan="7" class="loading">Loading books...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <!-- Book Details Modal -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Book Details</h2>
            <div id="modalContent" class="book-details">
                Loading...
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;" id="modalActions">
                <button class="action-btn" id="modalBorrowBtn" style="flex: 1;">Borrow</button>
                <button class="action-btn" id="modalEditBtn" style="flex: 1; display: none;">Edit</button>
                <button class="action-btn" id="modalDeleteBtn" style="flex: 1; display: none; background: #ff4757; color: white;">Delete</button>
            </div>
        </div>
    </div>
    
    <div id="errorMessage" class="error-message" style="display: none;"></div>
    
    <script src="../js/main.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let allBooks = [];
        let categories = [];
        const userRole = sessionStorage.getItem('userRole');
        
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadUserInfo();
            loadCategories();
            loadAllBooks();
            
            // Show/hide add book link based on role
            if (userRole !== 'ADMIN') {
                document.getElementById('addBookLink').style.display = 'none';
            }
        });
        
        function loadUserInfo() {
            const username = sessionStorage.getItem('username');
            document.getElementById('userName').textContent = username || 'User';
        }
        
        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE_URL}/categories`);
                categories = await response.json();
                
                const select = document.getElementById('categoryFilter');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }
        
        async function loadAllBooks() {
            try {
                const response = await fetch(`${API_BASE_URL}/books`);
                allBooks = await response.json();
                displayBooks(allBooks);
            } catch (error) {
                console.error('Error loading books:', error);
                showError('Failed to load books');
            }
        }
        
        function displayBooks(books) {
            const tbody = document.getElementById('booksTableBody');
            
            if (books.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="no-data">No books found</td></tr>';
                return;
            }
            
            tbody.innerHTML = books.map(book => `
                <tr>
                    <td>${book.isbn || 'N/A'}</td>
                    <td>${book.title || 'N/A'}</td>
                    <td>${book.author || 'N/A'}</td>
                    <td>${book.category?.name || 'Uncategorized'}</td>
                    <td>${book.available || 0} / ${book.quantity || 0}</td>
                    <td>${getStatusBadge(book)}</td>
                    <td>
                        <button class="action-btn" onclick="viewBookDetails(${book.id})">View</button>
                        ${book.available > 0 ? 
                            `<button class="action-btn" onclick="borrowBook(${book.id})">Borrow</button>` : 
                            '<button class="action-btn" disabled>Unavailable</button>'}
                        ${userRole === 'ADMIN' ? `
                            <button class="action-btn" onclick="editBook(${book.id})">Edit</button>
                            <button class="action-btn" onclick="deleteBook(${book.id})" style="border-color:#ff4757; color:#ff4757;">Delete</button>
                        ` : ''}
                    </td>
                </tr>
            `).join('');
        }
        
        function getStatusBadge(book) {
            if (book.available <= 0) {
                return '<span class="status-badge status-unavailable">Unavailable</span>';
            } else if (book.available < book.quantity) {
                return '<span class="status-badge status-borrowed">Partially Available</span>';
            } else {
                return '<span class="status-badge status-available">Available</span>';
            }
        }
        
        function applyFilters() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const categoryId = document.getElementById('categoryFilter').value;
            const availability = document.getElementById('availabilityFilter').value;
            
            let filtered = allBooks;
            
            if (keyword) {
                filtered = filtered.filter(book => 
                    book.title?.toLowerCase().includes(keyword) ||
                    book.author?.toLowerCase().includes(keyword) ||
                    book.isbn?.toLowerCase().includes(keyword)
                );
            }
            
            if (categoryId) {
                filtered = filtered.filter(book => book.category?.id == categoryId);
            }
            
            if (availability === 'available') {
                filtered = filtered.filter(book => book.available > 0);
            } else if (availability === 'borrowed') {
                filtered = filtered.filter(book => book.available < book.quantity);
            }
            
            displayBooks(filtered);
        }
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('availabilityFilter').value = 'all';
            displayBooks(allBooks);
        }
        
        async function viewBookDetails(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/books/${id}`);
                const book = await response.json();
                
                const modal = document.getElementById('bookModal');
                const content = document.getElementById('modalContent');
                
                content.innerHTML = `
                    <p><strong>ISBN:</strong> ${book.isbn || 'N/A'}</p>
                    <p><strong>Title:</strong> ${book.title || 'N/A'}</p>
                    <p><strong>Author:</strong> ${book.author || 'N/A'}</p>
                    <p><strong>Publisher:</strong> ${book.publisher || 'N/A'}</p>
                    <p><strong>Category:</strong> ${book.category?.name || 'Uncategorized'}</p>
                    <p><strong>Quantity:</strong> ${book.quantity || 0}</p>
                    <p><strong>Available:</strong> ${book.available || 0}</p>
                    <p><strong>Shelf Location:</strong> ${book.shelfLocation || 'N/A'}</p>
                    <p><strong>Description:</strong> ${book.description || 'No description'}</p>
                    <p><strong>Added Date:</strong> ${new Date(book.addedDate).toLocaleDateString() || 'N/A'}</p>
                `;
                
                const borrowBtn = document.getElementById('modalBorrowBtn');
                borrowBtn.onclick = () => borrowBook(book.id);
                borrowBtn.style.display = book.available > 0 ? 'block' : 'none';
                
                if (userRole === 'ADMIN') {
                    document.getElementById('modalEditBtn').style.display = 'block';
                    document.getElementById('modalEditBtn').onclick = () => editBook(book.id);
                    document.getElementById('modalDeleteBtn').style.display = 'block';
                    document.getElementById('modalDeleteBtn').onclick = () => deleteBook(book.id);
                }
                
                modal.style.display = 'block';
            } catch (error) {
                console.error('Error loading book details:', error);
                showError('Failed to load book details');
            }
        }
        
        function closeModal() {
            document.getElementById('bookModal').style.display = 'none';
        }
        
        async function borrowBook(id) {
            if (!confirm('Are you sure you want to borrow this book?')) return;
            
            const userId = sessionStorage.getItem('userId');
            
            try {
                const response = await fetch(`${API_BASE_URL}/borrow/borrow?userId=${userId}&bookId=${id}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Book borrowed successfully!');
                    loadAllBooks(); // Refresh the list
                    closeModal();
                } else {
                    showError(data.error || 'Failed to borrow book');
                }
            } catch (error) {
                console.error('Error borrowing book:', error);
                showError('Failed to borrow book');
            }
        }
        
        async function editBook(id) {
            window.location.href = `edit-book.html?id=${id}`;
        }
        
        async function deleteBook(id) {
            if (!confirm('Are you sure you want to delete this book? This action cannot be undone.')) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/books/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showSuccess('Book deleted successfully');
                    loadAllBooks(); // Refresh the list
                    closeModal();
                } else {
                    const data = await response.json();
                    showError(data.error || 'Failed to delete book');
                }
            } catch (error) {
                console.error('Error deleting book:', error);
                showError('Failed to delete book');
            }
        }
    </script>
</body>
</html>
